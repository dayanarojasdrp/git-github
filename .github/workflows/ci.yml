name: CI

on:
  push:
    branches:
      - main
       - feature/*

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev   # ← AQUÍ

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use secrets from dev
        run: |
          echo "API_KEY: ${{ secrets.API_KEY }}"
          echo "DB_PASSWORD: ${{ secrets.DB_PASSWORD }}"
